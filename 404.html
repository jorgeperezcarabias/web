<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Página no encontrada — RedAgraria</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/navbar-fix.css">

  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, var(--green-50) 0%, var(--white) 60%);
      padding: 2rem;
      text-align: center;
    }

    .error-page__inner {
      max-width: 520px;
    }

    .error-page__emoji {
      font-size: 5rem;
      display: block;
      margin-bottom: 1.5rem;
      animation: sway 3s ease-in-out infinite;
    }
    @keyframes sway {
      0%, 100% { transform: rotate(-4deg); }
      50%       { transform: rotate(4deg);  }
    }

    .error-page__code {
      font-family: var(--font-display);
      font-size: 7rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--green-900), var(--green-500));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .25rem;
    }

    .error-page__title {
      font-family: var(--font-display);
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--green-900);
      margin-bottom: 1rem;
    }

    .error-page__text {
      font-size: 1.0625rem;
      color: var(--gray-600);
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .error-page__actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-page__logo {
      margin: 0 auto 2rem;
      display: block;
    }
  </style>
</head>
<body>

  <div class="error-page" role="main">
    <div class="error-page__inner">

      <img src="assets/img/logo.svg" alt="RedAgraria" height="44" class="error-page__logo">

      <span class="error-page__emoji" aria-hidden="true">🌾</span>

      <p class="error-page__code" aria-label="Error 404">404</p>

        Pero el bot sigue ahí, listo para ayudarte.
