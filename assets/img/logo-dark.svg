<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="300" height="100" role="img" aria-label="RedAgraria — Plataforma Agrícola">
  <title>RedAgraria</title>
  <defs>
    <linearGradient id="dk_stem" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <radialGradient id="dk_glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Glow de fondo -->
  <ellipse cx="40" cy="48" rx="32" ry="38" fill="url(#dk_glow)"/>
  <!-- Raíz -->
  <path d="M18,82 Q32,75 46,82" fill="none" stroke="#4ade80" stroke-width="1.2" opacity="0.15" stroke-linecap="round"/>
  <!-- Tallo -->
  <line x1="32" y1="82" x2="47" y2="14" stroke="url(#dk_stem)" stroke-width="3" stroke-linecap="round"/>
  <!-- Ramas izquierda -->
  <line x1="42.5" y1="57" x2="20" y2="45" stroke="#4ade80" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="44"   y1="44" x2="18" y2="30" stroke="#86efac" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <line x1="45.5" y1="31" x2="22" y2="19" stroke="#bbf7d0" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>
  <!-- Ramas derecha -->
  <line x1="41"   y1="63" x2="57" y2="54" stroke="#4ade80" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>
  <line x1="43"   y1="50" x2="59" y2="41" stroke="#4ade80" stroke-width="1.2" stroke-linecap="round" opacity="0.35"/>
  <!-- Nodos izquierda -->
  <circle cx="20" cy="45" r="4"   fill="#4ade80"/>
  <circle cx="18" cy="30" r="3.2" fill="#86efac"/>
  <circle cx="22" cy="19" r="2.4" fill="#bbf7d0"/>
  <!-- Nodos derecha -->
  <circle cx="57" cy="54" r="2.5" fill="#4ade80" opacity="0.5"/>
  <circle cx="59" cy="41" r="1.9" fill="#4ade80" opacity="0.35"/>
  <!-- Nodo cima -->
  <circle cx="47" cy="14" r="6"   fill="#4ade80"/>
  <circle cx="47" cy="14" r="3"   fill="#ffffff" opacity="0.85"/>
  <!-- Wordmark -->
  <text x="76" y="48"
        font-family="'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif"
        font-size="30" font-weight="700" fill="#86efac" letter-spacing="-0.8">RedAgraria</text>
  <text x="78" y="64"
        font-family="'Trebuchet MS', 'Gill Sans', Arial, sans-serif"
        font-size="9.5" fill="#4ade80" letter-spacing="3.5" opacity="0.65">PLATAFORMA AGRÍCOLA</text>
  <!-- Línea decorativa -->
  <line x1="77" y1="69" x2="290" y2="69" stroke="#166534" stroke-width="0.7" opacity="0.5"/>
</svg>
